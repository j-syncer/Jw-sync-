<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Your Service Year Highlights — JW Sync</title>
  <style>
    body { background: #060d1a; color: #e2e8f0; margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, sans-serif; }
    * { box-sizing: border-box; }

    /* ── header ── */
    #hl-header { position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 100;
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
      background: rgba(8,15,30,.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.07); }
    .hl-back-btn { text-decoration: none; color: rgba(203,213,225,.7); font-size: 14px;
      flex-shrink: 0; transition: color .15s; cursor: pointer; }
    .hl-back-btn:hover { color: #f1f5f9; }
    .hl-title { color: #fb923c; font-weight: 600; font-size: 15px; flex-grow: 1; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hl-new-btn { background: transparent; border: none; color: rgba(203,213,225,.7); font-size: 14px;
      flex-shrink: 0; transition: color .15s; cursor: pointer; font-family: inherit; padding: 0; }
    .hl-new-btn:hover { color: #f1f5f9; }

    /* ── main content area ── */
    #hl-main { padding-top: 52px; max-width: 740px; margin: 0 auto; padding: 68px 16px 40px;
      min-height: 100vh; }

    /* ── file picker / loading / error states ── */
    .hl-pick { display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 20px; text-align: center; }
    .hl-pick-title { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .hl-pick-sub { color: #64748b; font-size: 15px; max-width: 360px; line-height: 1.5; }
    .hl-pick-btn { background: #ea580c; color: #fff; border: none; border-radius: 8px;
      padding: 13px 28px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s;
      font-family: inherit; }
    .hl-pick-btn:hover { background: #c2410c; }
    .hl-loading { display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 16px; }
    .hl-spin { width: 40px; height: 40px; border-radius: 50%; border: 3px solid rgba(234,88,12,.18);
      border-top-color: #ea580c; animation: hl-spin .8s linear infinite; }
    @keyframes hl-spin { to { transform: rotate(360deg); } }
    .hl-loading-msg { color: #94a3b8; font-size: 15px; }
    .hl-error { display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 16px; text-align: center; }
    .hl-error-msg { color: #f87171; font-size: 15px; max-width: 340px; }
    .hl-error-btn { background: transparent; border: 1px solid rgba(248,113,113,.4); color: #f87171;
      border-radius: 8px; padding: 9px 20px; font-size: 14px; cursor: pointer; font-family: inherit; }

    /* ── Wrapped module styles (from /tmp/wrapped_block_v2.html) ── */
    .jww-pad{padding:0}

    /* ── states ── */
    .jww-state{min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
      padding:60px 30px;text-align:center}
    .jww-spin{width:40px;height:40px;border-radius:50%;border:3px solid rgba(234,88,12,.18);border-top-color:#ea580c;
      animation:jww-spin .8s linear infinite}
    @keyframes jww-spin{to{transform:rotate(360deg)}}
    .jww-state-msg{color:#94a3b8;font-size:15px;line-height:1.5;max-width:340px}
    .jww-state .jww-btn{margin-top:6px}

    /* ── service year tabs ── */
    .jww-sy-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 18px;scrollbar-width:none;flex-shrink:0}
    .jww-sy-tabs::-webkit-scrollbar{display:none}
    .jww-sy-tab{flex-shrink:0;padding:6px 14px;border-radius:999px;border:1px solid rgba(71,85,105,.4);background:rgba(11,20,36,.6);color:#94a3b8;font-size:13px;font-weight:500;cursor:pointer;transition:color .15s,border-color .15s,background .15s;white-space:nowrap;font-family:inherit}
    .jww-sy-tab:hover{color:#f1f5f9;border-color:rgba(255,255,255,.15)}
    .jww-sy-tab.jww-sy-active{color:#fb923c;border-color:rgba(234,88,12,.5);background:rgba(234,88,12,.1)}
    .jww-sy-tabs-inline{display:flex;gap:5px;flex-wrap:wrap;padding:0 0 14px;margin-top:2px}
    .jww-sy-tabs-inline .jww-sy-tab{font-size:12px;padding:4px 10px}

    /* ── delta badges ── */
    .jww-delta-up{font-size:11px;font-weight:700;color:#4ade80;margin-left:7px;letter-spacing:-.2px}
    .jww-delta-dn{font-size:11px;font-weight:700;color:#f87171;margin-left:7px;letter-spacing:-.2px}
    .jww-delta-eq{font-size:11px;color:#64748b;margin-left:7px}
    .jww-cell-sub{display:block;font-size:10px;color:#475569;margin-top:2px;letter-spacing:.3px;text-transform:uppercase}

    /* ── hero ── */
    .jww-hero{text-align:center;padding-bottom:8px}
    .jww-filebadge{display:inline-flex;align-items:center;gap:7px;max-width:90%;
      background:rgba(11,20,36,.9);border:1px solid rgba(71,85,105,.35);border-radius:999px;
      padding:6px 14px;font-size:12.5px;color:#94a3b8;margin-bottom:22px;}
    .jww-filebadge svg{flex:0 0 auto;color:#64748b}
    .jww-filebadge span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .jww-eyebrow{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#ea580c;margin:0 0 14px}
    .jww-bignum{font-size:80px;line-height:1;font-weight:800;color:#fff;letter-spacing:-.03em;margin:0;
      font-variant-numeric:tabular-nums}
    .jww-bignum-label{font-size:15px;color:#94a3b8;margin:10px 0 0;font-weight:500}

    /* ── 4-stat grid ── */
    .jww-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:30px 0 8px}
    .jww-cell{background:rgba(11,20,36,.9);border:1px solid rgba(71,85,105,.3);border-radius:14px;
      padding:16px 10px;text-align:center}
    .jww-cell svg{color:#ea580c;margin-bottom:8px}
    .jww-cell-num{font-size:26px;font-weight:800;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
    .jww-cell-lbl{font-size:11.5px;color:#94a3b8;margin-top:6px;font-weight:500}

    /* ── section ── */
    .jww-section{margin-top:30px}
    .jww-sec-title{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#cbd5e1;
      margin:0 0 16px;display:flex;align-items:center;gap:8px}
    .jww-sec-title svg{color:#ea580c}

    /* ── horizontal bars (books) ── */
    .jww-hbar{margin-bottom:11px}
    .jww-hbar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;font-size:13.5px}
    .jww-hbar-name{color:#e2e8f0;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .jww-hbar-val{color:#94a3b8;font-variant-numeric:tabular-nums;flex:0 0 auto;margin-left:10px}
    .jww-hbar-track{height:9px;border-radius:99px;background:rgba(71,85,105,.22);overflow:hidden}
    .jww-hbar-fill{height:100%;border-radius:99px;background:#ea580c;width:0;transition:width .9s cubic-bezier(.16,1,.3,1)}

    /* ── vertical bars (years) ── */
    .jww-vbars{display:flex;align-items:flex-end;justify-content:space-around;gap:8px;height:160px;
      padding:0 4px;border-bottom:1px solid rgba(71,85,105,.3)}
    .jww-vcol{flex:1 1 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:0}
    .jww-vbar-val{font-size:12px;color:#94a3b8;margin-bottom:6px;font-variant-numeric:tabular-nums}
    .jww-vbar{width:100%;max-width:42px;border-radius:7px 7px 0 0;background:#ea580c;height:0;
      transition:height .9s cubic-bezier(.16,1,.3,1)}
    .jww-vlabels{display:flex;justify-content:space-around;gap:8px;padding:9px 4px 0}
    .jww-vlabel{flex:1 1 0;text-align:center;font-size:11.5px;color:#94a3b8;min-width:0}

    /* ── tags ── */
    .jww-tags{display:flex;flex-wrap:wrap;gap:9px}
    .jww-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(11,20,36,.9);
      border:1px solid rgba(71,85,105,.35);border-radius:999px;padding:7px 8px 7px 14px;font-size:13.5px;color:#e2e8f0}
    .jww-tag-badge{background:rgba(234,88,12,.16);color:#fb923c;border-radius:999px;font-size:12px;font-weight:700;
      padding:2px 9px;font-variant-numeric:tabular-nums}

    /* ── highlight colors ── */
    .jww-colorbar{display:flex;height:16px;border-radius:99px;overflow:hidden;margin-bottom:18px;
      background:rgba(71,85,105,.22)}
    .jww-colorbar-seg{height:100%;transition:flex-grow .8s cubic-bezier(.16,1,.3,1)}
    .jww-colorlist{display:flex;flex-direction:column;gap:10px}
    .jww-colorrow{display:flex;align-items:center;gap:11px;font-size:13.5px}
    .jww-swatch{width:15px;height:15px;border-radius:5px;flex:0 0 auto;box-shadow:0 0 0 1px rgba(255,255,255,.12) inset}
    .jww-color-name{color:#e2e8f0;flex:1}
    .jww-color-count{color:#94a3b8;font-variant-numeric:tabular-nums}
    .jww-color-pct{color:#64748b;font-variant-numeric:tabular-nums;width:46px;text-align:right}

    /* ── fun facts ── */
    .jww-facts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .jww-fact{background:rgba(11,20,36,.9);border:1px solid rgba(71,85,105,.3);border-radius:14px;padding:15px 16px}
    .jww-fact-lbl{font-size:11.5px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:6px}
    .jww-fact-val{font-size:18px;font-weight:700;color:#fff;line-height:1.2}
    .jww-fact-expandable{cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .15s;border-radius:8px;padding:8px 10px;margin:-8px -10px 0}
    .jww-fact-expandable:hover{background:rgba(255,255,255,.05)}
    .jww-fact-toggle{display:flex;align-items:center;gap:6px}
    .jww-expand-arr{font-size:10px;opacity:.5;transition:transform .2s;line-height:1;flex-shrink:0}
    .jww-fact-expandable.jww-open .jww-expand-arr{transform:rotate(90deg);opacity:.85}
    .jww-fact-note-panel{display:none;margin-top:8px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
    .jww-fact-note-panel.jww-open{display:block}
    .jww-fn-title{font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:6px;white-space:pre-wrap;word-break:break-word}
    .jww-fn-body{font-size:13px;color:#94a3b8;line-height:1.55;white-space:pre-wrap;word-break:break-word}
    .jww-fn-untitled{font-style:italic;color:#475569}

    /* ── footer ── */
    .jww-footer{display:flex;gap:11px;justify-content:flex-end;margin-top:32px;
      padding-top:20px;border-top:1px solid rgba(71,85,105,.25)}
    .jww-btn{border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;
      padding:11px 20px;border-radius:11px;transition:background .15s,opacity .15s}
    .jww-btn-primary{background:#ea580c;color:#fff;box-shadow:0 1px 5px rgba(234,88,12,.4)}
    .jww-btn-primary:hover{background:#c2410c}
    .jww-btn-ghost{background:rgba(71,85,105,.35);color:#cbd5e1}
    .jww-btn-ghost:hover{background:rgba(71,85,105,.55);color:#fff}
    .jww-empty{color:#94a3b8;font-size:11px;padding:14px;text-align:center}

    @media (max-width:560px){
      .jww-bignum{font-size:62px}
      .jww-grid{grid-template-columns:repeat(2,1fr)}
      .jww-facts{grid-template-columns:1fr}
      .jww-footer{flex-direction:column-reverse}
      .jww-footer .jww-btn{width:100%}
    }
    /* ── v2.25 deep analytics ── */
    .jww-mini-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:8px}
    .jww-mini{background:rgba(255,255,255,.03);border:1px solid #1f2a3d;border-radius:14px;padding:16px 14px;text-align:center}
    .jww-mini-num{font-size:26px;font-weight:800;color:#fb923c;font-variant-numeric:tabular-nums;line-height:1}
    .jww-mini-lbl{font-size:12.5px;color:#e2e8f0;font-weight:600;margin-top:6px}
    .jww-mini-sub{font-size:11px;color:#64748b;margin-top:2px}
    .jww-heat-wrap{overflow-x:auto;padding-bottom:6px}
    .jww-heat{display:flex;gap:3px;min-width:max-content}
    .jww-heat-week{display:flex;flex-direction:column;gap:3px}
    .jww-heat-cell{width:13px;height:13px;border-radius:3px;background:rgba(148,163,184,.10);animation:jwwHeatIn .45s ease both}
    .jww-h1{background:rgba(234,88,12,.30)}.jww-h2{background:rgba(234,88,12,.50)}.jww-h3{background:rgba(234,88,12,.72)}.jww-h4{background:#ea580c}
    @keyframes jwwHeatIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
    .jww-streak-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .jww-streak{background:linear-gradient(135deg,rgba(234,88,12,.12),rgba(234,88,12,.03));border:1px solid rgba(234,88,12,.28);border-radius:14px;padding:18px;text-align:center}
    .jww-streak-num{font-size:34px;font-weight:800;color:#fb923c;line-height:1;font-variant-numeric:tabular-nums}
    .jww-streak-lbl{font-size:12px;color:#94a3b8;margin-top:6px}
    .jww-dow{display:flex;align-items:flex-end;justify-content:space-around;gap:8px;height:140px;padding-top:10px}
    .jww-dow-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px}
    .jww-dow-val{font-size:11px;color:#94a3b8;font-variant-numeric:tabular-nums}
    .jww-dow-bar{width:70%;max-width:34px;height:0;background:linear-gradient(180deg,#fb923c,#ea580c);border-radius:6px 6px 0 0;transition:height .7s cubic-bezier(.2,.8,.2,1)}
    .jww-dow-lbl{font-size:11px;color:#64748b}
    .jww-growth{width:100%;height:90px;display:block;margin-top:6px}
    .jww-growth-line{stroke-dasharray:1200;stroke-dashoffset:1200;animation:jwwDraw 1.4s ease forwards}
    .jww-growth-area{opacity:0;animation:jwwFade .9s ease .55s forwards}
    @keyframes jwwDraw{to{stroke-dashoffset:0}}
    @keyframes jwwFade{to{opacity:1}}
    .jww-growth-labels{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-top:4px}
    .jww-growth-labels span:nth-child(2){color:#fb923c;font-weight:700}
    .jww-bible-top{text-align:center;margin:4px 0 14px}
    .jww-bible-big{font-size:40px;font-weight:800;color:#fb923c;line-height:1;font-variant-numeric:tabular-nums}
    .jww-bible-sub{font-size:12.5px;color:#94a3b8;margin-top:2px}
    .jww-bible-grid{display:grid;grid-template-columns:repeat(22,1fr);gap:3px;margin-bottom:14px}
    .jww-bcell{aspect-ratio:1;border-radius:2px;background:rgba(148,163,184,.10)}
    .jww-ot.jww-b2{background:rgba(96,165,250,.45)}.jww-ot.jww-b3{background:rgba(96,165,250,.7)}.jww-ot.jww-b4{background:#60a5fa}
    .jww-nt.jww-b2{background:rgba(251,146,60,.45)}.jww-nt.jww-b3{background:rgba(251,146,60,.72)}.jww-nt.jww-b4{background:#fb923c}
    .jww-otnt-bar{display:flex;height:10px;border-radius:6px;overflow:hidden;background:rgba(148,163,184,.12)}
    .jww-otnt-ot{background:#60a5fa}.jww-otnt-nt{background:#fb923c}
    .jww-otnt-legend{display:flex;justify-content:space-between;font-size:11.5px;color:#94a3b8;margin-top:7px}
    .jww-otnt-legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}
    .jww-dot-ot{background:#60a5fa}.jww-dot-nt{background:#fb923c}
    @media (max-width:520px){.jww-mini-row{grid-template-columns:1fr}.jww-bible-grid{grid-template-columns:repeat(11,1fr)}}
  </style>
</head>

    var IDB_NAME = 'jwsync_hl_v1';

    function readPendingFile() {
      return new Promise(function (resolve) {
        var req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = function (e) { e.target.result.createObjectStore(IDB_STORE); };
        req.onsuccess = function (e) {
          var db = e.target.result;
          var tx = db.transaction(IDB_STORE, 'readwrite');
          var getReq = tx.objectStore(IDB_STORE).get(IDB_KEY);
          getReq.onsuccess = function () {
            var val = getReq.result;
            tx.objectStore(IDB_STORE).delete(IDB_KEY); // consume it (one-shot)
            db.close();
            resolve(val || null);
          };
          getReq.onerror = function () { db.close(); resolve(null); };
        };
        req.onerror = function () { resolve(null); };
      });

    function num(db, sql) {

    function analyze(db, opts) {
      opts = opts || {};

      if (opts.start && opts.end) {
        dw = " AND nt.LastModified >= '" + opts.start + "' AND nt.LastModified <= '" + opts.end + "'";
      }
      var ndw = ''; // same but for direct Note queries (no alias)
      if (opts.start && opts.end) {
        ndw = " AND LastModified >= '" + opts.start + "' AND LastModified <= '" + opts.end + "'";
      }

      var s = {};
      s.notes = num(db, 'SELECT COUNT(*) FROM Note WHERE 1=1' + ndw);
      s.highlights = num(db, 'SELECT COUNT(*) FROM UserMark');
      s.bookmarks = num(db, 'SELECT COUNT(*) FROM Bookmark');
      s.tags = num(db, 'SELECT COUNT(*) FROM Tag');

      s.years = rows(db, "SELECT strftime('%Y', LastModified) yr, COUNT(*) n FROM Note WHERE LastModified IS NOT NULL" + ndw + " GROUP BY yr ORDER BY yr").map(function (v) { return { year: String(v[0]), n: +v[1] || 0 }; }).filter(function (y) { return /^\d{4}$/.test(y.year); });

      s.books = rows(db, 'SELECT l.BookNumber, COUNT(*) n FROM Note nt JOIN Location l ON nt.LocationId=l.LocationId WHERE l.BookNumber BETWEEN 1 AND 66' + dw + ' GROUP BY l.BookNumber ORDER BY n DESC LIMIT 8').map(function (v) { return { num: +v[0], name: BOOKS[(+v[0]) - 1] || ('Book ' + v[0]), n: +v[1] || 0 }; });

      s.tagList = rows(db, 'SELECT t.Name, COUNT(*) n FROM TagMap tm JOIN Tag t ON tm.TagId=t.TagId WHERE tm.NoteId IS NOT NULL GROUP BY t.Name ORDER BY n DESC LIMIT 12').map(function (v) { return { name: String(v[0] || ''), n: +v[1] || 0 }; });

      s.colors = rows(db, 'SELECT ColorIndex, COUNT(*) n FROM UserMark GROUP BY ColorIndex ORDER BY n DESC').map(function (v) { return { idx: +v[0], n: +v[1] || 0 }; }).filter(function (c) { return JWC[c.idx]; });

      var span = rows(db, 'SELECT MIN(LastModified), MAX(LastModified) FROM Note WHERE LastModified IS NOT NULL' + ndw);
      if (span.length && span[0]) { s.first = span[0][0] || null; s.last = span[0][1] || null; }
      if (s.first) {
        var fn = rows(db, "SELECT Title, Content FROM Note WHERE LastModified='" + s.first + "' LIMIT 1");
        if (fn.length && fn[0]) s.firstNote = { title: fn[0][0] || '', content: fn[0][1] || '' };
      }
      if (s.last) {
        var ln = rows(db, "SELECT Title, Content FROM Note WHERE LastModified='" + s.last + "' LIMIT 1");
        if (ln.length && ln[0]) s.lastNote = { title: ln[0][0] || '', content: ln[0][1] || '' };
      }

      var active = rows(db, "SELECT strftime('%Y-%m', LastModified) mo, COUNT(*) n FROM Note WHERE LastModified IS NOT NULL" + ndw + " GROUP BY mo ORDER BY n DESC LIMIT 1");
      if (active.length && active[0]) { s.activeMonth = active[0][0] || null; s.activeMonthN = +active[0][1] || 0; }

      // ── v2.25 deep analytics ──
      s.daily = rows(db, "SELECT strftime('%Y-%m-%d', LastModified) d, COUNT(*) n FROM Note WHERE LastModified IS NOT NULL" + ndw + " GROUP BY d ORDER BY d")
        .map(function (v) { return { d: String(v[0]), n: +v[1] || 0 }; })
        .filter(function (x) { return /^\d{4}-\d{2}-\d{2}$/.test(x.d); });
      s.dow = [0, 0, 0, 0, 0, 0, 0];
      rows(db, "SELECT strftime('%w', LastModified) w, COUNT(*) n FROM Note WHERE LastModified IS NOT NULL" + ndw + " GROUP BY w")
        .forEach(function (v) { var w = +v[0]; if (w >= 0 && w <= 6) s.dow[w] = +v[1] || 0; });
      s.months = rows(db, "SELECT strftime('%Y-%m', LastModified) mo, COUNT(*) n FROM Note WHERE LastModified IS NOT NULL" + ndw + " GROUP BY mo ORDER BY mo")
        .map(function (v) { return { mo: String(v[0]), n: +v[1] || 0 }; })
        .filter(function (x) { return /^\d{4}-\d{2}$/.test(x.mo); });
      s.bibleBooks = num(db, 'SELECT COUNT(DISTINCT l.BookNumber) FROM Note nt JOIN Location l ON nt.LocationId=l.LocationId WHERE l.BookNumber BETWEEN 1 AND 66' + dw);
      s.ot = num(db, 'SELECT COUNT(*) FROM Note nt JOIN Location l ON nt.LocationId=l.LocationId WHERE l.BookNumber BETWEEN 1 AND 39' + dw);
      s.nt = num(db, 'SELECT COUNT(*) FROM Note nt JOIN Location l ON nt.LocationId=l.LocationId WHERE l.BookNumber BETWEEN 40 AND 66' + dw);
      s.bookHits = {};
      rows(db, 'SELECT l.BookNumber, COUNT(*) n FROM Note nt JOIN Location l ON nt.LocationId=l.LocationId WHERE l.BookNumber BETWEEN 1 AND 66' + dw + ' GROUP BY l.BookNumber')
        .forEach(function (v) { s.bookHits[+v[0]] = +v[1] || 0; });
      s.pubs = rows(db, "SELECT l.KeySymbol, COUNT(*) n FROM Note nt JOIN Location l ON nt.LocationId=l.LocationId WHERE l.KeySymbol IS NOT NULL AND l.KeySymbol<>''" + dw + " GROUP BY l.KeySymbol ORDER BY n DESC LIMIT 8")

      contents.forEach(function (r) { var txt = stripNoteHtml(r[0]); var w = txt ? txt.split(/\s+/).filter(Boolean).length : 0; totalWords += w; if (w > longest) longest = w; });
      s.words = totalWords; s.longestNote = longest;
      s.hlWithNote = num(db, 'SELECT COUNT(*) FROM UserMark u WHERE EXISTS(SELECT 1 FROM Note n WHERE n.UserMarkId=u.UserMarkId)');

      return s;
    }

    function spanYears(first, last) {

    function animateCount(node, target, dur) {

      var start = null;
      function step(ts) {
        if (start == null) start = ts;
        var p = Math.min(1, (ts - start) / dur);
        var e = 1 - Math.pow(1 - p, 3);
        node.textContent = Math.round(target * e).toLocaleString(getLang());
        if (p < 1) requestAnimationFrame(step);
        else node.textContent = target.toLocaleString(getLang());
      }
      requestAnimationFrame(step);
    }

    function computeStreaks(daily) {

      var sorted = Object.keys(set).sort();
      function shift(dstr, n) { var dt = new Date(dstr + 'T00:00:00Z'); dt.setUTCDate(dt.getUTCDate() + n); return dt.toISOString().slice(0, 10); }
      var longest = 1, run = 1;
      for (var i = 1; i < sorted.length; i++) {

        else { run = 1; }

      // hero
      html += '<div class="jww-hero">';
      html += '<div class="jww-filebadge">' + IC.file + '<span>' + esc(filename || 'backup.jwlibrary') + '</span></div>';
      html += '<p class="jww-eyebrow">' + esc(t('title')) + '</p>';
      html += '<p class="jww-bignum" data-count="' + s.notes + '">0</p>';
      html += '<p class="jww-bignum-label">' + esc(t('notes_label').toLowerCase()) + '</p>';
      html += '</div>';

      // notes delta badge markup
      var notesDelta = '';
      if (inSY && prevS) {
        var d = s.notes - prevS.notes;
        if (d > 0) notesDelta = '<span class="jww-delta-up">↑ +' + d + '</span>';
        else if (d < 0) notesDelta = '<span class="jww-delta-dn">↓ ' + d + '</span>';
        else notesDelta = '<span class="jww-delta-eq">→ same</span>';
      }
      var allTimeSub = inSY ? '<span class="jww-cell-sub">' + esc(t('all_time')) + '</span>' : '';

      // 4-stat grid: notes / highlights / bookmarks / tags
      html += '<div class="jww-grid">';
      html += '<div class="jww-cell">' + IC.note + '<div class="jww-cell-num" data-count="' + s.notes + '">0</div><div class="jww-cell-lbl">' + esc(t('notes_label')) + notesDelta + '</div></div>';
      html += '<div class="jww-cell">' + IC.highlight + '<div class="jww-cell-num" data-count="' + s.highlights + '">0</div><div class="jww-cell-lbl">' + esc(t('highlights')) + allTimeSub + '</div></div>';
      html += '<div class="jww-cell">' + IC.bookmark + '<div class="jww-cell-num" data-count="' + s.bookmarks + '">0</div><div class="jww-cell-lbl">' + esc(t('bookmarks')) + allTimeSub + '</div></div>';
      html += '<div class="jww-cell">' + IC.tag + '<div class="jww-cell-num" data-count="' + s.tags + '">0</div><div class="jww-cell-lbl">' + esc(t('tags_label')) + allTimeSub + '</div></div>';
      html += '</div>';

      // ── deep analytics (v2.25): showcase charts ──
      html += wordsHtml(s);
      html += heatmapHtml(s);
      html += streakHtml(computeStreaks(s.daily));
      html += dowHtml(s);
      html += growthHtml(s);

      // top books
      if (s.books.length) {
        html += '<div class="jww-section"><h3 class="jww-sec-title">' + IC.book + esc(t('top_books')) + '</h3>';
        s.books.forEach(function (b, i) {
          var pct = Math.max(4, Math.round((b.n / maxBook) * 100));
          html += '<div class="jww-hbar"><div class="jww-hbar-top"><span class="jww-hbar-name">' + esc(b.name) + '</span><span class="jww-hbar-val">' + b.n + '</span></div>'
            + '<div class="jww-hbar-track"><div class="jww-hbar-fill" data-w="' + pct + '" data-i="' + i + '"></div></div></div>';
        });
        html += '</div>';
      }

      // activity by year
      if (s.years.length) {
        html += '<div class="jww-section"><h3 class="jww-sec-title">' + IC.chart + esc(t('timeline')) + '</h3>';
        if (tabsMeta.syList && tabsMeta.syList.length) {
          html += tabBarHtml(tabsMeta, 'jww-sy-tabs-inline');
        }
        var ys = s.years.slice(-10);
        html += '<div class="jww-vbars">';
        ys.forEach(function (y, i) {
          var pct = Math.max(3, Math.round((y.n / maxYear) * 100));
          html += '<div class="jww-vcol"><div class="jww-vbar-val">' + y.n + '</div><div class="jww-vbar" data-h="' + pct + '" data-i="' + i + '"></div></div>';
        });
        html += '</div><div class="jww-vlabels">';
        ys.forEach(function (y) { html += '<div class="jww-vlabel">' + esc(y.year) + '</div>'; });
        html += '</div></div>';
      }

      // tags
      if (s.tagList.length) {
        html += '<div class="jww-section"><h3 class="jww-sec-title">' + IC.tags + esc(t('your_tags')) + '</h3><div class="jww-tags">';
        s.tagList.forEach(function (tg) {
          html += '<span class="jww-tag">' + esc(tg.name) + '<span class="jww-tag-badge">' + tg.n + '</span></span>';
        });
        html += '</div></div>';
      }

      // highlight colors
      if (s.colors.length && totalHl) {
        html += '<div class="jww-section"><h3 class="jww-sec-title">' + IC.palette + esc(t('hl_colors')) + '</h3>';
        html += '<div class="jww-colorbar">';
        s.colors.forEach(function (c) {
          html += '<div class="jww-colorbar-seg" style="flex-grow:0;background:' + JWC[c.idx].h + '" data-grow="' + c.n + '"></div>';
        });
        html += '</div><div class="jww-colorlist">';
        s.colors.forEach(function (c) {
          var pct = Math.round((c.n / totalHl) * 100);
          html += '<div class="jww-colorrow"><span class="jww-swatch" style="background:' + JWC[c.idx].h + '"></span>'
            + '<span class="jww-color-name">' + esc(JWC[c.idx].n) + '</span>'
            + '<span class="jww-color-count">' + c.n + '</span>'
            + '<span class="jww-color-pct">' + pct + '%</span></div>';
        });
        html += '</div></div>';
      }

      // fun facts
      html += '<div class="jww-section"><h3 class="jww-sec-title">' + IC.facts + esc(t('most_active')) + '</h3><div class="jww-facts">';
      function noteFactHtml(labelKey, date, noteData, uid) {
        var id = 'jww-fn-' + uid;
        var hasNote = noteData && (noteData.title || noteData.content);
        if (!hasNote) {
          return '<div class="jww-fact"><div class="jww-fact-lbl">' + esc(t(labelKey)) + '</div>'
            + '<div class="jww-fact-val">' + esc(fmtDate(date)) + '</div></div>';
        }
        var snippet = noteData.content ? stripNoteHtml(noteData.content) : '';
        if (snippet.length > 160) snippet = snippet.slice(0, 157).trim() + '\u2026';
        var titleHtml = noteData.title ? '<div class="jww-fn-title">' + esc(noteData.title) + '</div>' : '';
        var bodyHtml = snippet
          ? '<div class="jww-fn-body">' + esc(snippet) + '</div>'
          : '<div class="jww-fn-body jww-fn-untitled">—</div>';
        return '<div class="jww-fact jww-fact-expandable" data-panel="' + id + '">'
          + '<div class="jww-fact-lbl">' + esc(t(labelKey)) + '</div>'
          + '<div class="jww-fact-val jww-fact-toggle">' + esc(fmtDate(date))
          + ' <span class="jww-expand-arr">▶</span></div></div>'
          + '<div class="jww-fact-note-panel" id="' + id + '">' + titleHtml + bodyHtml + '</div>';
      }
      html += noteFactHtml('first_note', s.first, s.firstNote, 'first');
      html += noteFactHtml('latest_note', s.last, s.lastNote, 'last');
      html += '<div class="jww-fact"><div class="jww-fact-lbl">' + esc(t('most_active')) + '</div><div class="jww-fact-val">' + (s.activeMonth ? esc(fmtMonth(s.activeMonth)) + ' (' + s.activeMonthN + ')' : '—') + '</div></div>';
      html += '<div class="jww-fact"><div class="jww-fact-lbl">' + esc(t('study_span')) + '</div><div class="jww-fact-val">' + yrs + ' ' + esc(yrs === 1 ? t('year_unit') : t('years_unit')) + '</div></div>';
      html += '</div></div>';

      // ── deep analytics (v2.25): coverage ──
      html += bibleHtml(s);
      html += pubsHtml(s);

      // footer
      html += '<div class="jww-footer">'
        + '<button class="jww-btn jww-btn-ghost jww-copy">' + esc(t('share')) + '</button>'
        + '</div>';

      html += '</div>';

      var body = setMain(html);
      if (!body) return;

      // wire tabs
      wireTabs(body);

      // wire expand-note click handlers
      Array.prototype.forEach.call(body.querySelectorAll('.jww-fact-expandable'), function (fact) {
        fact.addEventListener('click', function () {
          var panelId = fact.getAttribute('data-panel');
          var panel = document.getElementById(panelId);
          if (!panel) return;
          var open = panel.classList.contains('jww-open');
          panel.classList.toggle('jww-open', !open);
          fact.classList.toggle('jww-open', !open);
        });
      });

      // wire footer
      var copyBtn = body.querySelector('.jww-copy');
      if (copyBtn) copyBtn.addEventListener('click', function () {
        var txt = buildShareText(s, filename);
        var orig = t('share');
        function feedback() { copyBtn.textContent = t('copied'); setTimeout(function () { copyBtn.textContent = orig; }, 1600); }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(txt).then(feedback, function () { fallbackCopy(txt); feedback(); });
        } else { fallbackCopy(txt); feedback(); }
      });

      // animate counters
      setTimeout(function () {
        body.querySelectorAll('[data-count]').forEach(function (n) {
          var target = +n.getAttribute('data-count');
          if (n.getAttribute('data-decimal') === '1') animateDecimal(n, target, 1100);
          else animateCount(n, target, 1100);
        });
      }, 50);

      // animate bars (staggered)
      setTimeout(function () {
        body.querySelectorAll('.jww-hbar-fill').forEach(function (f) {
          var i = +f.getAttribute('data-i') || 0;
          setTimeout(function () { f.style.width = f.getAttribute('data-w') + '%'; }, i * 30);
        });
        body.querySelectorAll('.jww-vbar').forEach(function (f) {
          var i = +f.getAttribute('data-i') || 0;
          setTimeout(function () { f.style.height = f.getAttribute('data-h') + '%'; }, i * 30);
        });
        body.querySelectorAll('.jww-dow-bar').forEach(function (f) {
          var i = +f.getAttribute('data-i') || 0;
          setTimeout(function () { f.style.height = f.getAttribute('data-h') + '%'; }, i * 30);
        });
        body.querySelectorAll('.jww-colorbar-seg').forEach(function (f, i) {
          setTimeout(function () { f.style.flexGrow = f.getAttribute('data-grow'); }, i * 30);
        });
      }, 100);

      // reveal "new file" button
      var nb = document.getElementById('hl-new-btn');
      if (nb) nb.style.display = '';
    }

    // ── render against the loaded DB for the active service year ──
    function renderFull() {
      if (!loadedDb) return;
      var opts = (activeSY !== null) ? { start: syStart(activeSY), end: syEnd(activeSY) } : {};
      var s = analyze(loadedDb, opts);

      var prevS = null;
      if (activeSY !== null) {
        var idx = loadedSYs.indexOf(activeSY);
        if (idx !== -1 && idx + 1 < loadedSYs.length) {
          var prevYr = loadedSYs[idx + 1];
          prevS = analyze(loadedDb, { start: syStart(prevYr), end: syEnd(prevYr) });
        }
      }

      render(s, loadedFilename, { activeSY: activeSY, syList: loadedSYs, prevS: prevS });
    }

    // ── load from an ArrayBuffer ──
    function loadFromBuffer(name, buffer) {
      var filename = name || 'backup.jwlibrary';
      setMain('<div class="hl-loading"><div class="hl-spin"></div><div class="hl-loading-msg">' + esc(t('loading')) + '</div></div>');

      function doLoad() {
        var SQL;
        initSqlJs({ locateFile: function (f) { return SQLJS_CDN + f; } })
          .then(function (sql) {
            SQL = sql;
            return JSZip.loadAsync(buffer);
          })
          .then(function (zip) {
            var key = Object.keys(zip.files).find(function (f) { return /userdata\.db$/i.test(f); });
            if (!key) throw new Error('no db');
            return zip.file(key).async('uint8array');
          })
          .then(function (bytes) {
            try { if (loadedDb) loadedDb.close(); } catch (_) {}
            loadedDb = new SQL.Database(bytes);
            var probe = analyze(loadedDb, {});
            if (!probe.notes && !probe.highlights && !probe.bookmarks && !probe.tags) {
              try { loadedDb.close(); } catch (_) {}
              loadedDb = null;
              setMain('<div class="hl-error"><div class="hl-error-msg">' + esc(t('no_notes')) + '</div><button class="hl-error-btn" id="hl-err-retry">' + esc(t('open_file')) + '</button></div>');
              var rb = document.getElementById('hl-err-retry');
              if (rb) rb.addEventListener('click', showPicker);
              return;
            }
            loadedFilename = filename;
            loadedSYs = getAllSYs(loadedDb);
            activeSY = loadedSYs[0] || null;
            var nb = document.getElementById('hl-new-btn');
            if (nb) nb.style.display = '';
            renderFull();
          })
          .catch(function () {
            setMain('<div class="hl-error"><div class="hl-error-msg">' + esc(t('error')) + '</div><button class="hl-error-btn" id="hl-err-retry">' + esc(t('open_file')) + '</button></div>');
            var rb = document.getElementById('hl-err-retry');
            if (rb) rb.addEventListener('click', showPicker);
          });
      }

      // If deps not ready yet, poll until they are (they load eagerly at top of body)
      if (typeof initSqlJs === 'function' && typeof JSZip === 'function') {
        doLoad(); return;
      }
      var poll = setInterval(function () {
        if (typeof initSqlJs === 'function' && typeof JSZip === 'function') {
          clearInterval(poll); doLoad();
        }
      }, 100);
    }

    // ── load from a File / Blob / ArrayBuffer ──
    function loadFromFile(file) {
      var name = (file && file.name) || 'backup.jwlibrary';
      var getbuf = (file instanceof ArrayBuffer) ? Promise.resolve(file) :
        (typeof file.arrayBuffer === 'function' ? file.arrayBuffer() :
          new Promise(function (res, rej) { var r = new FileReader(); r.onload = function () { res(r.result); }; r.onerror = rej; r.readAsArrayBuffer(file); }));
      getbuf.then(function (buf) { loadFromBuffer(name, buf); }).catch(function () {
        setMain('<div class="hl-error"><div class="hl-error-msg">' + esc(t('error')) + '</div></div>');
      });
    }

    // ── file picker ──
    function showPicker() {
      var nb = document.getElementById('hl-new-btn');
      if (nb) nb.style.display = 'none';
      setMain(
        '<div class="hl-pick">' +
          '<div class="hl-pick-title">' + esc(t('title')) + '</div>' +
          '<div class="hl-pick-sub">' + esc(t('pick_file')) + '</div>' +
          '<button class="hl-pick-btn" id="hl-pick-trigger">' + esc(t('open_file')) + '</button>' +
        '</div>'
      );
      var input = document.createElement('input');
      input.type = 'file'; input.accept = '.jwlibrary'; input.style.display = 'none';
      document.body.appendChild(input);
      input.addEventListener('change', function () {
        if (input.files && input.files[0]) {
          document.body.removeChild(input);
          try { window.__jwLastFile = input.files[0]; } catch (_) {}
          loadFromFile(input.files[0]);
        }
      });
      var btn = document.getElementById('hl-pick-trigger');
      if (btn) btn.addEventListener('click', function () { input.click(); });
    }

    // ── set the title / header text in the current language ──
    function applyHeaderLang() {
      var titleEl = document.querySelector('.hl-title');
      if (titleEl) titleEl.textContent = t('title');
      document.title = t('title') + ' — JW Sync';
    }

    // ── "New file" button click handler ──
    var nbBtn = document.getElementById('hl-new-btn');
    if (nbBtn) {
      nbBtn.addEventListener('click', function () {
        try { if (loadedDb) loadedDb.close(); } catch (_) {}
        loadedDb = null;
        activeSY = null; loadedSYs = []; loadedFilename = '';
        showPicker();
      });
    }

    // ── page startup ──
    document.addEventListener('DOMContentLoaded', function () {
      applyHeaderLang();
      readPendingFile().then(function (pending) {
        if (pending && pending.buffer) {
          loadFromBuffer(pending.name || 'backup.jwlibrary', pending.buffer);
        } else {
          showPicker();
        }
      }).catch(function () {
        showPicker();
      });
    });

    // test hook — lets the test suite inject a file buffer without IDB
    window.__hlLoadFromBuffer = loadFromBuffer;
    window.__hlShowPicker = showPicker;
  })();
  </script>
</body>
</html>
